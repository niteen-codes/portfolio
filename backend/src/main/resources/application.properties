# --- SMTP config (credentials from environment variables — NEVER hardcode) ---
spring.mail.host=smtp.gmail.com
spring.mail.port=465
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.protocol=smtps
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.ssl.enable=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com
spring.mail.properties.mail.smtp.connectiontimeout=15000
spring.mail.properties.mail.smtp.timeout=15000
spring.mail.properties.mail.smtp.writetimeout=15000

# --- Resend HTTP API (used on cloud platforms where SMTP is blocked) ---
# Set RESEND_API_KEY environment variable on Render to enable HTTP-based email
resend.api.key=${RESEND_API_KEY:}
resend.from.email=${RESEND_FROM_EMAIL:Portfolio Contact <onboarding@resend.dev>}

server.port=${PORT:8080}
